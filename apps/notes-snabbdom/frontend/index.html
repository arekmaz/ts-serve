<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notes (Snabbdom)</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: system-ui, sans-serif;
        max-width: 480px;
        margin: 40px auto;
        padding: 0 16px;
        color: #1a1a1a;
      }
      h1 { font-size: 1.5rem; margin-bottom: 16px; }
      .add-form {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }
      .add-form input {
        flex: 1;
        padding: 8px 12px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 0.9rem;
      }
      .add-form input:focus { outline: none; border-color: #666; }
      .add-form button {
        padding: 8px 14px;
        border: none;
        border-radius: 6px;
        background: #1a1a1a;
        color: #fff;
        font-size: 0.9rem;
        cursor: pointer;
      }
      .add-form button:hover { background: #333; }
      ul { list-style: none; }
      .note {
        padding: 10px 0;
        border-bottom: 1px solid #eee;
        display: flex;
        align-items: flex-start;
        gap: 10px;
      }
      .note:last-child { border-bottom: none; }
      .note .content { flex: 1; cursor: default; }
      .note .title { font-size: 0.9rem; font-weight: 600; }
      .note .body { font-size: 0.8rem; color: #888; margin-top: 2px; white-space: pre-wrap; }
      .note .date { font-size: 0.7rem; color: #888; margin-top: 4px; }
      .note button {
        background: transparent;
        border: none;
        padding: 4px 8px;
        border-radius: 6px;
        color: #888;
        font-size: 0.8rem;
        cursor: pointer;
      }
      .note button:hover { color: #c00; background: #fee; }
      .edit-form { display: flex; flex-direction: column; gap: 6px; padding: 10px 0; border-bottom: 1px solid #eee; }
      .edit-form input, .edit-form textarea {
        padding: 4px 8px;
        font-size: 0.9rem;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-family: inherit;
      }
      .edit-form input:focus, .edit-form textarea:focus { outline: none; border-color: #666; }
      .edit-form textarea { min-height: 60px; resize: vertical; }
      .edit-form .actions { display: flex; gap: 6px; }
      .edit-form .actions button {
        padding: 4px 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        background: transparent;
        font-size: 0.8rem;
        cursor: pointer;
      }
      .edit-form .actions button:first-child {
        background: #1a1a1a;
        color: #fff;
        border-color: #1a1a1a;
      }
      .footer { margin-top: 12px; font-size: 0.8rem; color: #888; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="importmap">
      {
        "imports": {
          "snabbdom": "./public/js/snabbdom/index.ts"
        }
      }
    </script>
    <script type="module" src="./src/app.ts"></script>
  </body>
</html>
